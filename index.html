<!doctype html>
<html lang="ru" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f7f8fb">
<meta name="description" content="Интерактивная программа форума молодых педагогов «Жас маман – жаңа қадам!»">
<title>Жас маман – жаңа қадам! — программа форума</title>
<link rel="icon" type="image/png" href="logo.png">
<style>
:root{
 --bg:#f5f6f8; --surface:rgba(255,255,255,.82); --surface-solid:#fff; --text:#121318; --muted:#656a78;
 --line:rgba(18,19,24,.09); --blue:#2563eb; --violet:#7c3aed; --cyan:#06b6d4; --shadow:0 18px 60px rgba(32,45,80,.10);
 --radius:26px; --nav-h:76px; --max:1220px;
}
html[data-theme="dark"]{--bg:#090b10;--surface:rgba(20,23,31,.82);--surface-solid:#14171f;--text:#f5f7fb;--muted:#9ca3b2;--line:rgba(255,255,255,.10);--shadow:0 18px 60px rgba(0,0,0,.35)}
*{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Arial,sans-serif;-webkit-font-smoothing:antialiased}
body:before{content:"";position:fixed;inset:-20vh -20vw auto;height:62vh;background:radial-gradient(circle at 25% 25%,rgba(37,99,235,.16),transparent 42%),radial-gradient(circle at 70% 5%,rgba(124,58,237,.14),transparent 38%),radial-gradient(circle at 90% 70%,rgba(6,182,212,.10),transparent 34%);z-index:-1;pointer-events:none}
button,input{font:inherit} button{color:inherit}
.container{width:min(var(--max),calc(100% - 40px));margin-inline:auto}
.topbar{position:sticky;top:0;z-index:50;padding:12px 0;background:color-mix(in srgb,var(--bg) 72%,transparent);backdrop-filter:blur(24px) saturate(160%);border-bottom:1px solid var(--line)}
.nav{height:58px;display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:11px;min-width:0;margin-right:auto;text-decoration:none;color:var(--text)} .brand img{width:54px;height:54px;object-fit:contain;display:block;filter:drop-shadow(0 8px 16px rgba(37,99,235,.18))} .brand-copy{line-height:1.05;min-width:0} .brand-title{font-size:15px;font-weight:850;letter-spacing:-.02em;white-space:nowrap} .brand-sub{font-size:12px;color:var(--muted);margin-top:5px}
.segmented{display:flex;align-items:center;padding:4px;background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:0 5px 20px rgba(0,0,0,.04)}
.segmented button{border:0;background:transparent;padding:8px 11px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px} .segmented button.active{background:var(--surface-solid);box-shadow:0 4px 14px rgba(0,0,0,.08)}
.icon-btn{width:42px;height:42px;border:1px solid var(--line);background:var(--surface);border-radius:13px;cursor:pointer;display:grid;place-items:center}
.hero{padding:76px 0 42px} .hero-grid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:44px;align-items:center}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;color:var(--blue)} .eyebrow:before{content:"";width:28px;height:2px;background:linear-gradient(90deg,var(--blue),var(--violet));border-radius:2px}
.hero-title{margin:20px 0 20px;max-width:920px;font-weight:820}
.hero-title-line{display:block}
.hero-title-main{font-size:clamp(46px,6.4vw,78px);line-height:.96;letter-spacing:-.062em;color:var(--text)}
.hero-title-accent{width:max-content;max-width:100%;margin-top:10px;font-size:clamp(36px,5vw,62px);line-height:1;letter-spacing:-.048em;color:transparent;background:linear-gradient(100deg,var(--blue) 0%,var(--violet) 58%,var(--cyan) 100%);-webkit-background-clip:text;background-clip:text;text-wrap:balance}
.hero-sub{font-size:clamp(17px,2vw,22px);line-height:1.5;color:var(--muted);max-width:760px}
.date-chips{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px} .date-chip{padding:10px 14px;border:1px solid var(--line);background:var(--surface);border-radius:999px;font-weight:750;font-size:14px}
.hero-logo{position:relative} .hero-logo:before{content:"";position:absolute;inset:12%;border-radius:50%;background:linear-gradient(135deg,rgba(37,99,235,.34),rgba(124,58,237,.3));filter:blur(42px)} .hero-logo img{position:relative;width:100%;display:block;filter:drop-shadow(0 28px 45px rgba(68,74,190,.25));animation:float 7s ease-in-out infinite}
@keyframes float{50%{transform:translateY(-10px) rotate(1deg)}}
.controls-wrap{position:sticky;top:77px;z-index:40;padding:10px 0 16px;background:linear-gradient(var(--bg) 65%,transparent)}
.controls{display:grid;grid-template-columns:auto minmax(250px,1fr) auto;gap:12px;padding:12px;background:var(--surface);backdrop-filter:blur(24px);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}
.day-tabs,.group-tabs{display:flex;gap:6px;overflow:auto;scrollbar-width:none} .day-tabs::-webkit-scrollbar,.group-tabs::-webkit-scrollbar{display:none}
.tab{border:0;background:transparent;border-radius:14px;padding:11px 15px;white-space:nowrap;cursor:pointer;font-weight:750;color:var(--muted)} .tab.active{background:linear-gradient(135deg,var(--blue),var(--violet));color:white;box-shadow:0 9px 24px rgba(69,75,225,.24)}
.search{position:relative} .search input{width:100%;height:44px;border:1px solid var(--line);background:color-mix(in srgb,var(--surface-solid) 65%,transparent);color:var(--text);border-radius:14px;padding:0 42px 0 42px;outline:none} .search input:focus{border-color:rgba(37,99,235,.55);box-shadow:0 0 0 4px rgba(37,99,235,.10)}
.search svg{position:absolute;left:14px;top:13px;color:var(--muted)} .clear-search{position:absolute;right:7px;top:6px;width:32px;height:32px;border:0;border-radius:9px;background:transparent;cursor:pointer;color:var(--muted);display:none}
.group-tabs{padding:0 0 8px;margin:0 0 20px} .group-tabs .tab{background:var(--surface);border:1px solid var(--line)} .group-tabs .tab.active{background:var(--text);color:var(--bg);border-color:transparent;box-shadow:none}
.program-head{display:flex;justify-content:space-between;align-items:end;gap:20px;margin:38px 0 18px} .program-head h2{font-size:clamp(30px,4vw,46px);letter-spacing:-.045em;margin:0} .count{color:var(--muted);font-weight:650}
.timeline{display:flex;flex-direction:column;gap:14px;padding-bottom:80px}
.event{display:grid;grid-template-columns:134px minmax(0,1fr);gap:20px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:0 8px 28px rgba(22,31,54,.05);transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;content-visibility:auto;contain-intrinsic-size:180px}
.event:hover{transform:translateY(-2px);border-color:rgba(37,99,235,.22);box-shadow:0 16px 44px rgba(22,31,54,.09)}
.time{font-size:18px;font-weight:850;letter-spacing:-.02em;color:var(--blue);padding-top:3px} .event-body{min-width:0} .event-title{font-size:19px;line-height:1.44;font-weight:760;white-space:pre-line} .location{display:flex;gap:8px;align-items:flex-start;color:var(--muted);font-size:14px;line-height:1.5;margin-top:12px;white-space:pre-line} .location svg{flex:0 0 auto;margin-top:2px}
.rotation{background:linear-gradient(135deg,color-mix(in srgb,var(--surface-solid) 92%,var(--blue) 8%),var(--surface));border:1px solid color-mix(in srgb,var(--line) 60%,var(--blue) 40%);border-radius:30px;padding:22px;box-shadow:0 12px 42px rgba(50,68,130,.07);content-visibility:auto;contain-intrinsic-size:480px}
.rotation-head{display:flex;align-items:center;gap:12px;margin-bottom:16px} .rotation-head .time{padding:0} .rotation-badge{font-size:12px;font-weight:850;text-transform:uppercase;letter-spacing:.08em;color:var(--violet);background:rgba(124,58,237,.09);padding:7px 9px;border-radius:999px}
.group-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px} .group-card{min-width:0;border:1px solid var(--line);background:color-mix(in srgb,var(--surface-solid) 88%,transparent);border-radius:18px;padding:16px;transition:.2s ease}
.group-card:hover{border-color:rgba(37,99,235,.28);transform:translateY(-2px)} .group-label{display:inline-flex;font-size:12px;font-weight:850;padding:6px 9px;border-radius:999px;background:rgba(37,99,235,.09);color:var(--blue);margin-bottom:12px} .group-text{white-space:pre-line;font-size:14px;line-height:1.52;color:var(--text)}
.group-text::first-line{font-weight:850} .group-card.hidden{display:none} .group-grid.filtered{grid-template-columns:minmax(0,720px)} .group-grid.filtered .group-card{padding:22px} .group-grid.filtered .group-text{font-size:16px}
.empty{display:none;text-align:center;padding:60px 20px;background:var(--surface);border:1px solid var(--line);border-radius:26px;color:var(--muted)}
footer{border-top:1px solid var(--line);padding:28px 0 44px;color:var(--muted);font-size:13px} .footer-inner{display:flex;justify-content:space-between;gap:20px;align-items:center} .footer-brand{display:flex;align-items:center;gap:10px} .footer-brand img{width:34px;height:34px;border-radius:10px}
.to-top{position:fixed;right:22px;bottom:22px;width:48px;height:48px;border:1px solid var(--line);background:var(--surface);backdrop-filter:blur(18px);border-radius:15px;display:grid;place-items:center;box-shadow:var(--shadow);cursor:pointer;opacity:0;pointer-events:none;transform:translateY(8px);transition:.2s} .to-top.show{opacity:1;pointer-events:auto;transform:none}
.fade-in{animation:fade .35s ease both} @keyframes fade{from{opacity:0;transform:translateY(8px)}}
@media(max-width:1000px){.group-grid{grid-template-columns:repeat(2,minmax(0,1fr))} .hero-grid{grid-template-columns:1fr 220px} .controls{grid-template-columns:1fr 1fr} .search{grid-column:1/-1;grid-row:2}}
@media(max-width:720px){
 .container{width:min(100% - 24px,var(--max))} .topbar{padding:7px 0} .nav{height:48px} .brand{gap:9px} .brand img{width:44px;height:44px} .brand-title{font-size:14px} .brand-sub{font-size:11px;margin-top:4px} .segmented button{padding:7px 9px} .icon-btn{width:38px;height:38px}
 .hero{padding:46px 0 26px} .hero-grid{grid-template-columns:1fr} .hero-logo{display:none} .hero-title{margin-top:16px} .hero-title-main{font-size:clamp(42px,12vw,58px)} .hero-title-accent{font-size:clamp(34px,10vw,48px);margin-top:8px} .hero-sub{font-size:16px} .date-chips{margin-top:20px}
 .controls-wrap{top:61px;padding-top:7px} .controls{grid-template-columns:1fr;padding:8px;border-radius:18px;gap:8px} .search{grid-column:auto;grid-row:auto} .day-tabs{order:1} .search{order:2} .controls .desktop-group{display:none}
 .program-head{margin-top:28px} .program-head h2{font-size:32px} .event{grid-template-columns:1fr;gap:9px;padding:18px;border-radius:21px} .time{font-size:16px} .event-title{font-size:16px} .rotation{padding:16px;border-radius:22px}
 .group-grid{grid-template-columns:1fr} .group-card{padding:15px} .group-grid.filtered .group-card{padding:16px} .group-grid.filtered .group-text{font-size:14px}
 .footer-inner{align-items:flex-start;flex-direction:column} .to-top{right:14px;bottom:14px}
}
@media print{.topbar,.controls-wrap,.group-tabs,.to-top{display:none!important} body{background:#fff} .hero{padding:20px 0} .hero-logo{display:none} .event,.rotation{break-inside:avoid;box-shadow:none} .group-grid{grid-template-columns:repeat(2,1fr)}}

/* Индивидуальные цвета групп */
.group-tabs .tab[data-group="1"],
.group-card[data-group="1"]{--group-color:#ffe200;--group-ink:#171717}
.group-tabs .tab[data-group="2"],
.group-card[data-group="2"]{--group-color:#753bdf;--group-ink:#ffffff}
.group-tabs .tab[data-group="3"],
.group-card[data-group="3"]{--group-color:#00dba5;--group-ink:#06251d}
.group-tabs .tab[data-group="4"],
.group-card[data-group="4"]{--group-color:#0078e8;--group-ink:#ffffff}
.group-tabs .tab[data-group="5"],
.group-card[data-group="5"]{--group-color:#ffba6f;--group-ink:#2a1705}

.group-tabs .tab[data-group]:not([data-group="0"]){
  background:color-mix(in srgb,var(--group-color) 13%,var(--surface));
  border-color:color-mix(in srgb,var(--group-color) 48%,var(--line));
  color:var(--text);
}
.group-tabs .tab[data-group]:not([data-group="0"]):hover{
  background:color-mix(in srgb,var(--group-color) 22%,var(--surface));
  border-color:var(--group-color);
  transform:translateY(-1px);
}
.group-tabs .tab[data-group]:not([data-group="0"]).active{
  background:var(--group-color);
  color:var(--group-ink);
  border-color:var(--group-color);
  box-shadow:0 8px 22px color-mix(in srgb,var(--group-color) 34%,transparent);
}

.group-card[data-group]{
  position:relative;
  overflow:hidden;
  border-color:color-mix(in srgb,var(--group-color) 42%,var(--line));
  background:
    linear-gradient(135deg,
      color-mix(in srgb,var(--group-color) 10%,var(--surface-solid)),
      color-mix(in srgb,var(--group-color) 3%,var(--surface-solid)));
}
.group-card[data-group]::before{
  content:"";
  position:absolute;
  inset:0 auto 0 0;
  width:5px;
  background:var(--group-color);
}
.group-card[data-group]:hover{
  border-color:var(--group-color);
  box-shadow:0 14px 34px color-mix(in srgb,var(--group-color) 16%,transparent);
}
.group-card[data-group] .group-label{
  background:var(--group-color);
  color:var(--group-ink);
  box-shadow:0 6px 16px color-mix(in srgb,var(--group-color) 26%,transparent);
}

</style>
</head>

const UI={"ru": {"html_lang": "ru", "eyebrow": "Областной форум молодых педагогов", "title": "ЖАС МАМАН – ЖАҢА ҚАДАМ!", "subtitle": "Интерактивная программа форума · 26–28 июня 2026", "program": "Программа", "search": "Поиск по программе", "search_ph": "Тема, спикер, мероприятие…", "all": "Все группы", "group": "Группа", "day": "День", "june": "июня", "events": "мероприятий", "location": "Локация", "platform": "Площадка", "clear": "Очистить", "no_results": "Ничего не найдено. Измените запрос или выберите другую группу.", "source": "Программа составлена по предоставленному документу.", "today": "Расписание", "menu": "Навигация", "theme": "Тема", "top": "Наверх", "show_all": "Показать все группы", "compact": "Моя группа"}, "kk": {"html_lang": "kk", "eyebrow": "Облыстық жас педагогтер форумы", "title": "ЖАС МАМАН – ЖАҢА ҚАДАМ!", "subtitle": "Форумның интерактивті бағдарламасы · 26–28 маусым 2026", "program": "Бағдарлама", "search": "Бағдарлама бойынша іздеу", "search_ph": "Тақырып, спикер, іс-шара…", "all": "Барлық топтар", "group": "Топ", "day": "Күн", "june": "маусым", "events": "іс-шара", "location": "Локация", "platform": "Алаң", "clear": "Тазалау", "no_results": "Ештеңе табылмады. Сұрауды өзгертіңіз немесе басқа топты таңдаңыз.", "source": "Бағдарлама ұсынылған құжат негізінде жасалды.", "today": "Кесте", "menu": "Навигация", "theme": "Тақырып", "top": "Жоғары", "show_all": "Барлық топты көрсету", "compact": "Менің тобым"}};
let state={lang:'ru',day:0,group:0,query:''};
const $=s=>document.querySelector(s);
const storageGet=k=>{try{return localStorage.getItem(k)}catch(e){return null}};
const storageSet=(k,v)=>{try{localStorage.setItem(k,v)}catch(e){}};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const iconPin=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="2.5"/></svg>`;
function normalize(s){return String(s).toLocaleLowerCase(state.lang==='kk'?'kk-KZ':'ru-RU')}
function setLang(lang){state.lang=lang;document.documentElement.lang=UI[lang].html_lang;document.querySelectorAll('.lang').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));renderChrome();render();storageSet('forum-lang',lang)}
function renderChrome(){const u=UI[state.lang];$('#brandSub').textContent=u.program;$('#eyebrow').textContent=u.eyebrow;const heroTitle=$('#heroTitle');heroTitle.setAttribute('aria-label',u.title);heroTitle.innerHTML='<span class="hero-title-line hero-title-main">Жас маман</span><span class="hero-title-line hero-title-accent">Жаңа қадам!</span>';$('#heroSub').textContent=u.subtitle;$('#programLabel').textContent=u.program;$('#searchInput').placeholder=u.search_ph;$('#empty').textContent=u.no_results;renderDayTabs();renderGroupTabs()}
function renderDayTabs(){const u=UI[state.lang];$('#dayTabs').innerHTML=[26,27,28].map((d,i)=>`<button class="tab ${state.day===i?'active':''}" data-day="${i}">${d} ${u.june}</button>`).join('');$('#dayTabs').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.day=+b.dataset.day;renderDayTabs();render()})}
function groupButtons(){const u=UI[state.lang];return [0,1,2,3,4,5].map(g=>`<button class="tab ${state.group===g?'active':''}" data-group="${g}">${g===0?u.all:`${u.group} ${g}`}</button>`).join('')}
function renderGroupTabs(){['#desktopGroups','#mobileGroups'].forEach(sel=>{$(sel).innerHTML=groupButtons();$(sel).querySelectorAll('button').forEach(b=>b.onclick=()=>{state.group=+b.dataset.group;renderGroupTabs();render()})})}
function eventCard(row){let search=normalize(row.time+' '+row.event+' '+row.location);if(state.query&&!search.includes(normalize(state.query)))return '';return `<article class="event fade-in" data-search="${esc(search)}"><div class="time">${esc(row.time)}</div><div class="event-body"><div class="event-title">${esc(row.event)}</div>${row.location?`<div class="location">${iconPin}<span>${esc(row.location)}</span></div>`:''}</div></article>`}
function rotationCard(row){const u=UI[state.lang];let cards='';let matched=false;row.groups.forEach((text,i)=>{const group=i+1;const isVisible=state.group===0||state.group===group;const qmatch=!state.query||normalize(row.time+' '+text+' '+u.group+' '+group).includes(normalize(state.query));if(isVisible&&qmatch){matched=true;cards+=`<article class="group-card" data-group="${group}"><div class="group-label">${u.group} ${group}</div><div class="group-text">${esc(text)}</div></article>`}});if(!matched)return '';return `<section class="rotation fade-in"><div class="rotation-head"><div class="time">${esc(row.time)}</div><span class="rotation-badge">${u.platform}</span></div><div class="group-grid ${state.group?'filtered':''}">${cards}</div></section>`}
function render(){const u=UI[state.lang];const day=DATA[state.lang][state.day];$('#dayHeading').textContent=`${day.date}`;let html='';let count=0;for(const row of day.rows){if(row.type==='group_header')continue;const part=row.type==='groups'?rotationCard(row):eventCard(row);if(part){html+=part;count++}}$('#timeline').innerHTML=html;$('#count').textContent=`${count} ${u.events}`;$('#empty').style.display=count?'none':'block';$('#clearSearch').style.display=state.query?'block':'none'}
document.querySelectorAll('.lang').forEach(b=>b.onclick=()=>setLang(b.dataset.lang));
$('#searchInput').addEventListener('input',e=>{state.query=e.target.value;render()});$('#clearSearch').onclick=()=>{state.query='';$('#searchInput').value='';render();$('#searchInput').focus()};
const savedLang=storageGet('forum-lang');if(savedLang&&UI[savedLang])state.lang=savedLang;
const theme=storageGet('forum-theme')||'light';document.documentElement.dataset.theme=theme;$('#themeIcon').textContent=theme==='dark'?'☀':'☾';
$('#themeBtn').onclick=()=>{const next=document.documentElement.dataset.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=next;$('#themeIcon').textContent=next==='dark'?'☀':'☾';storageSet('forum-theme',next)};
window.addEventListener('scroll',()=>$('#toTop').classList.toggle('show',scrollY>500),{passive:true});$('#toTop').onclick=()=>scrollTo({top:0,behavior:'smooth'});
renderChrome();render();
</script>
